meters:
- name: platform_fee
  description: Monthly platform fee per app, set by tier (Individual, Startup, Growth).
  unit: app
  aggregation: sum
  dimensions:
  - account
  - app
  - tier
- name: protected_requests
  description: Base protected-request fee charged per request, billed per 1M requests.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - app
- name: bot_detection_requests
  description: Bot detection evaluations, billed per 1M requests.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - app
- name: advanced_bot_signals
  description: Advanced bot signal lookups, billed per 1M requests.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - app
- name: email_validations
  description: Email validation checks, billed per 1K validations.
  unit: validations
  aggregation: sum
  dimensions:
  - account
  - app
- name: pii_detection
  description: Sensitive-info / PII detection evaluations, billed per 1M requests.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - app
- name: prompt_scanning
  description: Prompt injection / scanning, billed per 1M tokens.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - app
- name: saml_sso
  description: SAML SSO add-on, billed per month.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track per-app protected-request volume and per-protection usage in the Arcjet dashboard; map platform fees to each app.
- name: Allocation
  description: One app per Arcjet application; tag apps per team/service to map platform and usage fees to cost centers.
- name: Optimization
  description: Enable only the protections you need per app; rely on local WebAssembly analysis and SDK caching to avoid unnecessary Decide calls; scope advanced bot signals and prompt scanning to high-value routes.
- name: Accountability
  description: Assign owners per app; review protected-request and per-protection burn monthly against budget, and revisit tier choice as team size and traffic grow.

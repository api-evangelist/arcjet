description: >-
  FinOps view of Arcjet spend. Arcjet bills a monthly platform fee per app per
  tier (Individual $25, Startup $299, Growth $799, Enterprise custom) plus
  usage-based fees metered per protected request ($0.50/1M) with additional
  charges for bot detection ($0.50/1M), advanced bot signals ($2/1M), email
  validations ($1.50/1K), PII detection ($1/1M), prompt scanning ($2/1M tokens),
  and SAML SSO ($300/mo). Cost scales with traffic volume and which protections
  are enabled.
notes: >-
  Per-tier and per-usage rates are subject to change; verify against the Arcjet
  pricing page during reconciliation. Pricing is per application.
